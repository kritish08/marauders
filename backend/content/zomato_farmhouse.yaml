monument:
  id: zomato_farmhouse
  name:
    en: Zomato Farmhouse
    hi: ज़ोमैटो फार्महाउस
    fr: Ferme Zomato
    es: Zomato Farmhouse
  languages:
  - en
  - hi
  - fr
  - es
  overview:
    en: Welcome to the farmhouse — part garden, part office, part playground, and
      for these 36 hours, the birthplace of everything you're about to see. Seven secrets
      hide between the parking lot and the war room. Point your camera and find them.
    hi: फार्महाउस में आपका स्वागत है — कुछ बगीचा, कुछ दफ़्तर, कुछ खेल का मैदान, और
      अगले 36 घंटों के लिए वह सब कुछ जो आप देखने वाले हैं उसका जन्मस्थान। पार्किंग
      से लेकर वॉर-रूम तक सात राज़ छिपे हैं। कैमरा घुमाइए और उन्हें ढूँढिए।
    fr: Bienvenue à la ferme — en partie jardin, en partie bureau, en partie terrain
      de jeu, et pendant ces 36 heures, le lieu de naissance de tout ce que vous êtes
      sur le point de voir. Sept secrets se cachent entre le parking et la salle de
      guerre. Pointez votre caméra et trouvez-les.
    es: 'Bienvenidos a la casa de campo: parte jardín, parte oficina, parte patio
      de juegos y, durante estas 36 horas, el lugar de nacimiento de todo lo que están
      a punto de ver. Siete secretos se esconden entre el estacionamiento y la sala
      de guerra. Apunten su cámara y descúbranlos.'
  ambientTrack: music/ambient_default.mp3
checkpoints:
- id: cp_parking
  name:
    en: The Parking Area
    hi: पार्किंग एरिया
    fr: L’aire de stationnement
    es: El estacionamiento
  mapPosition:
    x: 0.5
    y: 0.82
  intro:
    en: Where every journey here begins — and three very different residents are each
      hiding a story.
    hi: जहाँ हर सफ़र शुरू होता है — और तीन बिलकुल अलग किरदार अपनी-अपनी कहानी छिपाए
      बैठे हैं।
    fr: Là où commence chaque visite ici — et où trois habitants très différents cachent
      chacun une histoire.
    es: Donde comienza cada viaje aquí, y tres residentes muy diferentes esconden cada
      uno una historia.
  gps:
    lat: 28.479144110947203
    lng: 77.16345551893588
    radius: 35
  nuggets:
  - id: n_parking_tree
    title:
      en: The Tree That Refused to Move
      hi: वह पेड़ जो हटने से इनकार कर गया
      fr: L’arbre qui refusait de bouger
      es: El árbol que se negó a moverse
    targetImageId: zf_parking_tree
    exclusive: true
    images:
    - images/n_parking_tree_0.webp
    - images/n_parking_tree_1.webp
    - images/n_parking_tree_2.webp
    text:
      en: 'Look up. This tree was here long before the tarmac, the SUVs, or the Wi-Fi.
        When they paved the lot, they didn''t cut it down — they built the whole parking
        around it. Every car here parks in the shade of the oldest employee on the
        property: one that''s never missed a day, and never asked for a raise.'
      hi: ऊपर देखिए। यह पेड़ यहाँ तब से है जब न सड़क थी, न ये गाड़ियाँ, न वाई-फ़ाई।
        जब पार्किंग बनी तो इसे काटा नहीं गया — पूरी पार्किंग इसके चारों ओर बनाई गई।
        हर गाड़ी यहाँ परिसर के सबसे पुराने कर्मचारी की छाँव में खड़ी होती है — जिसने
        न कभी छुट्टी ली, न कभी तनख़्वाह माँगी।
      fr: 'Levez les yeux. Cet arbre était là bien avant le goudron, les SUV ou le
        Wi‑Fi. Quand ils ont goudronné le parking, ils ne l’ont pas abattu — ils ont
        construit tout le stationnement autour de lui. Chaque voiture ici se gare
        à l’ombre du plus ancien employé de la propriété : un arbre qui n’a jamais
        manqué un jour de travail et n’a jamais demandé d’augmentation.'
      es: 'Mira hacia arriba. Este árbol estaba aquí mucho antes del asfalto, las
        SUV o el Wi‑Fi. Cuando pavimentaron el estacionamiento, no lo talaron: construyeron
        todo el aparcamiento a su alrededor. Todos los coches aquí aparcan a la sombra
        del empleado más antiguo de la propiedad: uno que nunca ha faltado un día
        y nunca ha pedido un aumento.'
  - id: n_parking_gwagon
    title:
      en: The Underdog in the Parking Lot
      hi: पार्किंग का अनसुना हीरो
      fr: Le perdant dans le parking
      es: El perdedor en el estacionamiento
    targetImageId: zf_gwagon
    targetImageIds:
    - zf_gwagon_0
    - zf_gwagon_1
    - zf_gwagon_2
    - zf_gwagon_3
    - zf_gwagon_4
    exclusive: false
    images:
    - images/n_parking_gwagon_0.webp
    - images/n_parking_gwagon_1.webp
    - images/n_parking_gwagon_2.webp
    text:
      en: 'Surrounded by glossy SUVs sits DL 14 CF 1143 — a humble Maruti WagonR.
        Don''t laugh. The little tall-boy that fits four engineers and a weekend of
        energy drinks beats every luxury badge here on the one metric that matters
        at 3 AM: it always starts. The real getaway car of any hackathon isn''t the
        fastest — it''s the reliable one.'
      hi: 'चमचमाती SUV के बीच खड़ी है DL 14 CF 1143 — एक साधारण मारुति वैगनआर। हँसिए
        मत। जो छोटी गाड़ी चार इंजीनियर और वीकेंड भर के एनर्जी ड्रिंक समेट ले, वह रात
        3 बजे उस एक पैमाने पर हर महँगे बैज को हरा देती है: यह हमेशा स्टार्ट होती है।
        किसी भी हैकाथॉन की असली गेटअवे कार सबसे तेज़ नहीं, सबसे भरोसेमंद होती है।'
      fr: 'Entourée de SUV rutilants se trouve la DL 14 CF 1143 — une modeste Maruti
        WagonR. Ne riez pas. La petite « tall-boy » qui peut accueillir quatre ingénieurs
        et un week-end de boissons énergétiques surpasse ici toutes les marques de
        luxe sur le seul critère qui compte à 3 h du matin : elle démarre toujours.
        La vraie voiture de fuite de tout hackathon n’est pas la plus rapide — c’est
        la plus fiable.'
      es: 'Rodeado de relucientes SUV se encuentra el DL 14 CF 1143: un humilde Maruti
        WagonR. No se rían. El pequeño “tall-boy” que puede llevar a cuatro ingenieros
        y un fin de semana de bebidas energéticas supera a cualquier emblema de lujo
        aquí en la única métrica que importa a las 3 de la mañana: siempre arranca.
        El verdadero coche de escape de cualquier hackatón no es el más rápido: es
        el fiable.'
  - id: n_parking_cabin
    title:
      en: The Container That Clocked In
      hi: वह कंटेनर जो ड्यूटी पर आ गया
      fr: Le conteneur qui a pris son service
      es: El contenedor que fichó para trabajar
    targetImageId: zf_cabin
    targetImageIds:
    - zf_cabin_0
    - zf_cabin_1
    - zf_cabin_2
    - zf_cabin_3
    exclusive: false
    images:
    - images/n_parking_cabin_0.webp
    - images/n_parking_cabin_1.webp
    - images/n_parking_cabin_2.webp
    text:
      en: At first glance, it is just a weathered red box beside a brick outbuilding.
        Then the single door and window change the reading. This shipping-container-style
        cabin is a neat picture of adaptive reuse, with an ordinary industrial shape
        pressed into service as a practical site room. Trees soften one edge; stacked
        materials keep the other firmly in worksite territory. It may not win “most
        glamorous room” in the parking lot, but that is precisely the charm. Sometimes
        useful architecture simply turns up in red, ready for the morning shift.
      hi: पहली नज़र में यह ईंट की एक बाहरी इमारत के पास रखा, मौसम की मार झेल चुका
        लाल डिब्बा भर लगता है। फिर उसका एक दरवाज़ा और एक खिड़की नज़रिया बदल देते
        हैं। शिपिंग कंटेनर जैसी यह केबिन अनुकूल पुनःउपयोग की बढ़िया तस्वीर है—एक
        साधारण औद्योगिक ढाँचा, जिसे व्यावहारिक साइट रूम के रूप में काम पर लगा दिया
        गया है। एक ओर पेड़ इसे नरम बनाते हैं, दूसरी ओर रखा सामान माहौल को कामकाजी
        बनाए रखता है। यह पार्किंग का “सबसे शानदार कमरा” शायद न हो, पर यही इसका
        आकर्षण है। कभी-कभी उपयोगी वास्तुकला लाल रंग में सुबह की ड्यूटी पर आ जाती है।
      fr: À première vue, ce n’est qu’une boîte rouge patinée par le temps, posée à
        côté d’une dépendance en brique. Puis son unique porte et son unique fenêtre
        changent la façon de la regarder. Cette cabine aux allures de conteneur maritime
        offre une belle image du réemploi adaptatif, avec une forme industrielle ordinaire
        transformée en local de chantier pratique. Les arbres adoucissent un côté,
        tandis que les matériaux empilés maintiennent l’autre dans l’univers du travail.
        Elle ne remportera peut-être pas le prix de la « pièce la plus glamour » du
        parking, mais c’est précisément son charme. Parfois, l’architecture utile arrive
        simplement en rouge, prête pour le service du matin.
      es: A primera vista, no es más que una caja roja desgastada por el tiempo junto
        a una construcción auxiliar de ladrillo. Después, su única puerta y su única
        ventana cambian la forma de verla. Esta caseta con aspecto de contenedor marítimo
        es una buena imagen de reutilización adaptativa, con una forma industrial corriente
        convertida en un práctico espacio de trabajo. Los árboles suavizan un lado;
        los materiales apilados mantienen el otro firmemente ligado al entorno laboral.
        Quizá no gane el premio a la “sala más glamurosa” del estacionamiento, pero
        ahí reside su encanto. A veces, la arquitectura útil simplemente aparece vestida
        de rojo, lista para el turno de la mañana.
