- id: cp_office
  name:
    en: The Office Building
    hi: ऑफ़िस बिल्डिंग
    fr: Le bâtiment administratif
    es: El edificio de oficinas
  mapPosition:
    x: 0.62
    y: 0.2
  intro:
    en: Where the farm stops being scenery and becomes a workplace — the nerve centre.
    hi: जहाँ फार्म नज़ारा नहीं, कार्यस्थल बन जाता है — असली नर्व सेंटर।
    fr: Là où la ferme cesse d’être un décor et devient un lieu de travail — le centre
      névralgique.
    es: 'Donde la granja deja de ser decorado y se convierte en lugar de trabajo:
      el centro neurálgico.'
  gps:
    lat: 28.479144110947203
    lng: 77.16345551893588
    radius: 35
  nuggets:
  - id: n_office_frontdesk
    title:
      en: The Screen Everything Rides On
      hi: वह स्क्रीन जिस पर सब कुछ टिका है
      fr: L’écran sur lequel tout repose
      es: La pantalla sobre la que todo viaja
    targetImageId: zf_frontdesk
    exclusive: false
    images:
    - images/n_office_frontdesk_0.webp
    text:
      en: One projector screen, one long white desk, and a room where every big idea
        gets its first honest audience. Careers have turned on what appeared here
        for ninety seconds. If these walls could autoplay, they'd show a thousand
        demos — most of them opening with the words, "so… it was working a minute
        ago."
      hi: 'एक प्रोजेक्टर स्क्रीन, एक लंबी सफ़ेद मेज़, और एक कमरा जहाँ हर बड़े आइडिया
        को उसकी पहली ईमानदार सुनवाई मिलती है। यहाँ नब्बे सेकंड में करियर बदल चुके
        हैं। अगर ये दीवारें ऑटोप्ले कर पातीं, तो हज़ार डेमो दिखातीं — ज़्यादातर इन
        शब्दों से शुरू: "अभी तो एक मिनट पहले चल रहा था।"'
      fr: 'Un écran de projection, un long bureau blanc, et une salle où chaque grande
        idée trouve son premier public honnête. Des carrières ont basculé sur ce qui
        a été présenté ici pendant quatre-vingt-dix secondes. Si ces murs pouvaient
        lancer une lecture automatique, ils montreraient mille démonstrations — la
        plupart commençant par les mots : « alors… ça marchait il y a une minute.
        »'
      es: 'Una pantalla de proyector, un largo escritorio blanco y una sala donde
        toda gran idea tiene su primer público honesto. Carreras enteras han dado
        un giro por lo que apareció aquí durante noventa segundos. Si estas paredes
        pudieran reproducirse solas, mostrarían mil demostraciones, la mayoría empezando
        con las palabras: «así que… estaba funcionando hace un minuto».'
