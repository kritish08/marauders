- id: cp_farmhouse
  name:
    en: The Farm House Area
    hi: फार्म हाउस एरिया
    fr: La zone de la ferme
    es: El área de la casa de la granja
  mapPosition:
    x: 0.4
    y: 0.5
  intro:
    en: The prettiest corner of the property — and it's hiding a small architectural
      joke.
    hi: परिसर का सबसे ख़ूबसूरत कोना — और इसमें एक छोटा-सा वास्तुशिल्प मज़ाक छिपा है।
    fr: Le plus joli coin de la propriété — et il cache une petite plaisanterie architecturale.
    es: El rincón más bonito de la propiedad — y esconde una pequeña broma arquitectónica.
  gps:
    lat: 28.479144110947203
    lng: 77.16345551893588
    radius: 35
  nuggets:
  - id: n_farmhouse_building
    title:
      en: The House That Throws Shade (Literally)
      hi: वह घर जो सचमुच छाया बनाता है
      fr: La maison qui fait de l’ombre (au sens propre)
      es: La casa que da sombra (literalmente)
    targetImageId: zf_farmhouse
    exclusive: false
    images:
    - images/n_farmhouse_building_0.webp
    text:
      en: Those bold concrete frames aren't only for looks. Open to the sky, they
        slice the harsh afternoon sun into soft geometric shadows that crawl across
        the floor all day — a sundial you can walk through. A farmhouse pretending
        to be a modern art installation. Or maybe the other way around.
      hi: ये मोटे कंक्रीट के फ्रेम सिर्फ़ दिखावे के लिए नहीं हैं। खुले आसमान तले,
        ये दोपहर की तेज़ धूप को नरम ज्यामितीय परछाइयों में काट देते हैं जो दिन भर
        फ़र्श पर सरकती रहती हैं — एक ऐसी धूपघड़ी जिसमें आप चल सकते हैं। एक फार्महाउस
        जो आधुनिक कला बनने का नाटक कर रहा है। या शायद इसका उल्टा।
      fr: Ces cadres en béton audacieux ne sont pas là uniquement pour leur apparence.
        Ouverts vers le ciel, ils découpent le soleil dur de l’après-midi en ombres
        géométriques douces qui glissent sur le sol toute la journée — un cadran solaire
        que l’on peut traverser. Une ferme qui se fait passer pour une installation
        d’art moderne. Ou peut-être l’inverse.
      es: 'Esos audaces marcos de hormigón no son solo por estética. Abiertos al cielo,
        dividen el duro sol de la tarde en suaves sombras geométricas que recorren
        el suelo durante todo el día: un reloj de sol por el que se puede caminar.
        Una casa de campo que se hace pasar por una instalación de arte moderno. O
        quizá al revés.'
  - id: n_farmhouse_garden
    title:
      en: The Roman Villa in Gurugram
      hi: गुड़गाँव में रोमन विला
      fr: La villa romaine à Gurugram
      es: La villa romana en Gurugram
    targetImageId: zf_garden
    exclusive: true
    images:
    - images/n_farmhouse_garden_0.webp
    - images/n_farmhouse_garden_1.webp
    - images/n_farmhouse_garden_2.webp
    - images/n_farmhouse_garden_3.webp
    text:
      en: 'White fluted columns, bougainvillea spilling over stone, a lawn glowing
        green under the night lamps — for one second you''re not in Haryana, you''re
        in a Mediterranean courtyard. This colonnade is the property''s worst-kept
        secret: after dark, it''s the most photographed three metres on the entire
        farm.'
      hi: 'सफ़ेद खम्भे, पत्थरों पर बिखरा बोगनवेलिया, रात की रोशनी में दमकती हरी घास
        — एक पल के लिए आप हरियाणा में नहीं, किसी भूमध्यसागरीय आँगन में होते हैं। यह
        खम्भों वाला हिस्सा परिसर का सबसे खुला राज़ है: अँधेरे के बाद यह पूरे फार्म
        की सबसे ज़्यादा फ़ोटो खिंचवाने वाली तीन मीटर ज़मीन है।'
      fr: 'Des colonnes blanches cannelées, des bougainvilliers débordant sur la pierre,
        une pelouse d’un vert éclatant sous les lampes de nuit — pendant une seconde,
        vous n’êtes plus au Haryana, vous êtes dans une cour méditerranéenne. Cette
        colonnade est le secret le moins bien gardé de la propriété : à la nuit tombée,
        c’est les trois mètres les plus photographiés de toute la ferme.'
      es: 'Columnas blancas acanaladas, buganvillas desbordándose sobre la piedra,
        un césped que resplandece verde bajo las lámparas nocturnas: por un segundo
        no estás en Haryana, estás en un patio mediterráneo. Esta columnata es el
        secreto peor guardado de la propiedad: al anochecer, es los tres metros más
        fotografiados de toda la finca.'
